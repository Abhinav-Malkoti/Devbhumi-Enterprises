    <style>
      /* Critically important: Noise filter for Cinematic effect */
      #noise-filter {
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        opacity: 0.05;
      }
    </style>

  <body class="bg-background text-dark">
    <!-- SVG Noise Overlay -->
    <svg id="noise-filter" xmlns="http://www.w3.org/2000/svg">
      <filter id="noise">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      </filter>
      <rect width="100%" height="100%" filter="url(#noise)" />
    </svg>
